# yaml-language-server: $schema=https://json.schemastore.org/hexo.json

# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Pasule Blog
subtitle: ''
description: 'pasule的个人博客网站喵~'
keywords:
author: Pasule
language: zh-CN
timezone: 'Asia/Shanghai'

# URL - 针对GitHub Pages优化
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://pasule.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false # 移除尾部 'index.html' 提升SEO
  trailing_html: false # 移除尾部 '.html' 提升SEO

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 6  # 减少首页文章数量提升加载速度
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination - 优化分页设置
## Set per_page to 0 to disable pagination
per_page: 8  # 减少每页显示数量，提升加载速度
pagination_dir: page

# INSERT_YOUR_REWRITE_HERE
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# 使用hexo-neat进行代码压缩优化
neat_enable: true

neat_html:
  enable: true
  exclude:
    - '**/*.min.html'

neat_css:
  enable: true
  exclude:
    - '**/*.min.css'

neat_js:
  enable: true
  mangle: true
  output:
  compress:
  exclude:
    - '**/*.min.js'
    - '**/live2dw/**'

# Search optimization
search:
  zip: true

# GitHub Pages 性能优化
# 启用 Gzip 压缩 (GitHub Pages 会自动处理)
# 启用浏览器缓存优化
deploy:
  type: git
  repository: https://github.com/pasule/pasule.github.io.git
  branch: main
  ignore_hidden: false
  ignore_pattern:
    - "README.md"
    - "*.map"  # 不部署 source map 文件减少体积
    - "node_modules/"
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"

# Live2D - 优化版本
## https://github.com/EYHN/hexo-helper-live2d
live2d:
  enable: true #开关插件版看板娘
  scriptFrom: jsdelivr # 使用CDN加速
  pluginRootPath: live2dw/ # 插件在站点上的根目录(相对路径)
  pluginJsPath: lib/ # 脚本文件相对与插件根目录路径
  pluginModelPath: assets/ # 模型文件相对与插件根目录路径
  tagMode: false # 标签模式, 是否仅替换 live2d tag标签而非插入到所有页面中
  debug: false # 调试, 是否在控制台输出日志
  model:
    use: live2d-widget-model-koharu # npm-module package name
  display:
    position: right #控制看板娘位置
    width: 120 #减小大小  
    height: 240 #减小大小
  mobile:
    show: false # 手机端不显示，提升移动端性能

# mermaid chart  
mermaid: ## mermaid url https://github.com/knsv/mermaid  
  enable: true  # default true  
  version: "7.1.2" # default v7.1.2  
  options:  # find more api options from https://github.com/knsv/mermaid/blob/master/src/mermaidAPI.js  
    #startOnload: true  // default true
